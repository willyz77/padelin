<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padelin - Padel Score Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Background Putih Bersih */
  --bg:#f8fafc;--surface:#ffffff;--surface-2:#f1f5f9;--surface-3:#e2e8f0;
  
  /* Sporty Light Theme */
  --primary:#2563eb; /* Biru Sporty */
  --primary-hover:#1d4ed8;
  --primary-glow:rgba(37,99,235,0.2);
  --primary-bg:rgba(37,99,235,0.1);
  
  --secondary:#16a34a; /* Hijau Padel */
  --secondary-hover:#15803d;
  --secondary-glow:rgba(22,163,74,0.2);
  --secondary-bg:rgba(22,163,74,0.1);

  /* Variabel mapping agar logic jalan */
  --blue: var(--primary); 
  --yellow: var(--secondary);
  
  --orange:#ea580c;--red:#ef4444;--green:#16a34a;
  
  --text:#0f172a; /* Teks utama gelap */
  --dark-text:#ffffff; /* Teks di dalam tombol jadi putih */
  --muted:#64748b;
  --border:#e2e8f0;--border-bright:#93c5fd;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.fd{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.card.glow{box-shadow:0 0 20px var(--primary-glow);border-color:var(--border-bright)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.4px}
.b-blue{background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-glow)}
.b-yellow{background:var(--secondary-bg);color:var(--secondary);border:1px solid var(--secondary-glow)}
.b-orange{background:rgba(234,88,12,.12);color:#ea580c;border:1px solid rgba(234,88,12,.25)}
.b-muted{background:rgba(0,0,0,.04);color:var(--muted);border:1px solid rgba(0,0,0,.08)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed;background:var(--surface-3);color:var(--muted);box-shadow:none}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px}
.btn-md{padding:10px 20px}
.btn-lg{padding:14px 28px;font-size:15px}

.btn-primary{background:var(--primary);color:var(--dark-text);box-shadow:0 0 20px var(--primary-glow)}
.btn-primary:not(:disabled):hover{background:var(--primary-hover)}

.btn-yellow{background:var(--secondary);color:#fff;box-shadow:0 0 20px var(--secondary-glow)}
.btn-yellow:not(:disabled):hover{background:var(--secondary-hover)}

.btn-sec{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-sec:not(:disabled):hover{background:var(--surface-3)}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:not(:disabled):hover{background:rgba(0,0,0,.04);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:not(:disabled):hover{background:rgba(239,68,68,.2)}
.w-full{width:100%}

input.ti{width:100%;background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:14px;font-family:'Outfit',sans-serif;color:var(--text);outline:none;transition:border-color .15s}
input.ti:focus{border-color:var(--primary)}
.score-in{width:90px;text-align:center;background:var(--surface-3);border:1.5px solid var(--border-bright);border-radius:16px;padding:14px 6px;font-size:44px;font-family:'Bebas Neue',sans-serif;color:var(--primary);outline:none;transition:all .15s}
.score-in:focus{border-color:var(--primary);box-shadow:0 0 15px var(--primary-glow)}
.score-in.team-b{color:var(--secondary);border-color:var(--secondary-glow)}
.score-in.team-b:focus{border-color:var(--secondary);box-shadow:0 0 15px var(--secondary-glow)}
.score-auto{width:90px;text-align:center;background:var(--surface-2);border:1.5px solid var(--border);border-radius:16px;padding:14px 6px;font-size:44px;font-family:'Bebas Neue',sans-serif;color:var(--secondary);display:flex;align-items:center;justify-content:center}

.pill{background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.pill:hover{border-color:rgba(0,0,0,.2);color:var(--text)}
.pill.sel-b{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}
.pill.sel-y{background:var(--secondary-bg);border-color:var(--secondary);color:var(--secondary)}

.mode-card{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;border-radius:16px;border:2px solid var(--border);padding:20px;cursor:pointer;transition:all .15s;background:var(--surface-2);text-align:left;position:relative}
.mode-card:hover{border-color:rgba(0,0,0,.15)}
.mode-card.mc-b{border-color:var(--primary);background:var(--primary-bg);box-shadow:0 0 25px var(--primary-glow)}
.mode-card.mc-y{border-color:var(--secondary);background:var(--secondary-bg);box-shadow:0 0 25px var(--secondary-glow)}

.sc-opt{width:100%;display:flex;align-items:center;justify-content:space-between;border-radius:16px;border:2px solid var(--border);padding:16px 20px;cursor:pointer;transition:all .15s;background:var(--surface-2)}
.sc-opt:hover{border-color:rgba(0,0,0,.15)}
.sc-opt.sc-b{border-color:var(--primary);background:var(--primary-bg)}
.sc-opt.sc-y{border-color:var(--secondary);background:var(--secondary-bg)}
.sc-opt.sc-o{border-color:var(--orange);background:rgba(234,88,12,.06)}
.rdot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.rdot.rd-b{border-color:var(--primary);background:var(--primary)}
.rdot.rd-y{border-color:var(--secondary);background:var(--secondary)}
.rdot.rd-o{border-color:var(--orange);background:var(--orange)}

.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sdot-active{background:var(--primary);color:var(--dark-text)}
.sdot-done{background:var(--surface-3);color:var(--primary)}
.sdot-pending{background:var(--surface-2);color:var(--muted)}
.sline{flex:1;height:2px;background:var(--border);border-radius:1px}
.sline-done{background:var(--primary)}

.hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:nowrap}

.team-chip{background:var(--primary-bg);border:1px solid var(--primary-glow);border-radius:12px;padding:8px 12px;text-align:center;font-weight:600;font-size:14px;color:var(--primary)}
.team-chip.b{background:var(--secondary-bg);border-color:var(--secondary-glow);color:var(--secondary)}

table.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:8px 10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.st td{padding:10px;border-bottom:1px solid var(--surface-2)}
.st tr:last-child td{border-bottom:none}
.st tr:hover td{background:var(--surface-2)}

.hi{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:12px;padding:10px 14px;font-size:13px}

.modal-bg{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}

.winner-ring{width:80px;height:80px;border-radius:50%;background:var(--primary-bg);border:1px solid var(--primary-glow);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.pod-bar{width:100%;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>
<script>
// -- helpers ------------------------------------------------------------------
const uuid=()=>crypto.randomUUID()
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}

function el(tag,attrs,...kids){
  const e=document.createElement(tag)
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='cls')e.className=v
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v)
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v)
    else if(typeof v==='boolean') {
      if(v) e.setAttribute(k,'')
      else e.removeAttribute(k)
    }
    else e.setAttribute(k,v)
  }
  for(const c of kids.flat(99)){
    if(c==null||c===false||c===undefined)continue
    e.appendChild(typeof c==='string'?document.createTextNode(c):c)
  }
  return e
}

function svg(name,sz=16){
  const P={
    check:'M20 6 9 17l-5-5',
    trophy:'M6 9H4.5a2.5 2.5 0 010-5H6m12 5h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.29 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.29 17 22M18 2H6v7a6 6 0 0012 0V2z',
    zap:'M13 2 3 14h9l-1 8 10-12h-9l1-8z',
    crown:'M11.562 3.266a.5.5 0 01.876 0L15.39 8.87l6.084-2.428a.5.5 0 01.682.628l-3.79 8.52a1 1 0 01-.92.61H6.554a1 1 0 01-.92-.61L1.844 7.07a.5.5 0 01.682-.628L8.61 8.87z',
    edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z',
    x:'M18 6 6 18M6 6l12 12',plus:'M12 5v14M5 12h14',
    hist:'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z',
    restart:'M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8',
    cl:'M15 18l-6-6 6-6',cr:'M9 18l6-6-6-6',cd:'M6 9l6 6 6-6',
    shield:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
    star:'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z',
    user:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z',
  }
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg')
  s.setAttribute('width',sz);s.setAttribute('height',sz)
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none')
  s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2')
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round')
  const p=document.createElementNS('http://www.w3.org/2000/svg','path')
  p.setAttribute('d',P[name]||'');s.appendChild(p);return s
}

function badge(txt,color='muted'){return el('span',{cls:`badge b-${color}`},txt)}
function div(...a){return el('div',{},...a)}
function sp(cls,...a){return el('span',{cls},...a)}

// -- game logic ---------------------------------------------------------------
function mkPlayer(name){return{id:uuid(),name:name.trim()||'Player',wins:0,losses:0,draws:0,points:0,pointsAgainst:0,gamesPlayed:0,restCount:0}}

function chooseSitOut(players,courts){
  const need=courts*4,rest=players.length-need
  if(rest<=0)return[]
  // Shuf dulu sebelum sort agar yang poinnya sama dipilih secara random untuk istirahat
  const s=shuf(players).sort((a,b)=>a.restCount-b.restCount||a.gamesPlayed-b.gamesPlayed)
  return s.slice(0,rest).map(p=>p.id)
}

function mkFixedTeams(players){
  const teams=[]
  for(let i=0;i<players.length-1;i+=2){
    teams.push({id:`t${i}_${players[i].id}_${players[i+1].id}`,players:[players[i].id,players[i+1].id]})
  }
  return teams
}

function chooseSitOutTeams(players,teams,courts){
  const needTeams=courts*2
  const restTeams=teams.length-needTeams
  if(restTeams<=0)return[]
  const rankedTeams=shuf(teams).sort((a,b)=>{
    const aRest=Math.min(...a.players.map(id=>players.find(p=>p.id===id)?.restCount??0))
    const bRest=Math.min(...b.players.map(id=>players.find(p=>p.id===id)?.restCount??0))
    if(aRest!==bRest)return aRest-bRest
    const aGames=Math.min(...a.players.map(id=>players.find(p=>p.id===id)?.gamesPlayed??0))
    const bGames=Math.min(...b.players.map(id=>players.find(p=>p.id===id)?.gamesPlayed??0))
    return aGames-bGames
  })
  return rankedTeams.slice(0,restTeams)
}

function rankFixedTeams(players,teams){
  return [...teams].sort((a,b)=>{
    const aStats=a.players.map(id=>players.find(p=>p.id===id)).filter(Boolean)
    const bStats=b.players.map(id=>players.find(p=>p.id===id)).filter(Boolean)
    const aWins=aStats.reduce((s,p)=>s+p.wins,0)
    const bWins=bStats.reduce((s,p)=>s+p.wins,0)
    if(bWins!==aWins)return bWins-aWins
    const aPts=aStats.reduce((s,p)=>s+p.points,0)
    const bPts=bStats.reduce((s,p)=>s+p.points,0)
    if(bPts!==aPts)return bPts-aPts
    const aAgainst=aStats.reduce((s,p)=>s+p.pointsAgainst,0)
    const bAgainst=bStats.reduce((s,p)=>s+p.pointsAgainst,0)
    return aAgainst-bAgainst
  })
}

function genMatches(players,done,mode,round,courts){
  if(players.length<4)return[]
  if(mode==='fixed_americano'||mode==='fixed_mexicano'){
    const teams=mkFixedTeams(players)
    if(teams.length<2)return[]
    const sitOutTeams=chooseSitOutTeams(players,teams,courts)
    const sitOut=sitOutTeams.flatMap(t=>t.players)
    const pool=teams.filter(t=>!sitOutTeams.some(st=>st.id===t.id))
    const ordered=mode==='fixed_mexicano'?rankFixedTeams(players,pool):shuf(pool)
    const matches=[]
    for(let i=0;i<Math.floor(ordered.length/2);i++){
      const ta=ordered[i*2]
      const tb=ordered[i*2+1]
      if(!ta||!tb)break
      matches.push({
        id:`m${Date.now()}${i}${Math.random().toString(36).slice(2)}`,
        teamA:[...ta.players],
        teamB:[...tb.players],
        scoreA:null,scoreB:null,sets:[],completed:false,roundNumber:round,courtNumber:i+1,sitOut
      })
    }
    return matches
  }
  const sitOut=chooseSitOut(players,courts)
  const pool=players.filter(p=>!sitOut.includes(p.id))

  const pairCounts={}
  for(const m of done)for(const pair of[m.teamA,m.teamB]){const k=[...pair].sort().join('|');pairCounts[k]=(pairCounts[k]||0)+1}

  let ordered
  if(mode==='mexicano'){
    ordered=[...pool].sort((a,b)=>b.wins-a.wins||b.points-a.points||a.pointsAgainst-b.pointsAgainst)
  }else{
    ordered=shuf(pool)
  }

  const matches=[]
  for(let i=0;i<Math.floor(ordered.length/4);i++){
    const cp=ordered.slice(i*4,i*4+4)
    if(cp.length<4)break
    let teamA,teamB
    if(mode==='mexicano'){
      // Mexicano mod: Rank 1 & 3 vs Rank 2 & 4
      teamA=[cp[0].id,cp[2].id];teamB=[cp[1].id,cp[3].id]
    }else{
      const pairs=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]]
      const scored=pairs.map(([pa,pb])=>{
        const kA=[cp[pa[0]].id,cp[pa[1]].id].sort().join('|')
        const kB=[cp[pb[0]].id,cp[pb[1]].id].sort().join('|')
        return{pair:[pa,pb],s:(pairCounts[kA]||0)+(pairCounts[kB]||0)}
      })
      const min=Math.min(...scored.map(s=>s.s))
      const best=shuf(scored.filter(s=>s.s===min))[0].pair
      teamA=[cp[best[0][0]].id,cp[best[0][1]].id]
      teamB=[cp[best[1][0]].id,cp[best[1][1]].id]
    }
    matches.push({id:`m${Date.now()}${i}${Math.random().toString(36).slice(2)}`,teamA,teamB,scoreA:null,scoreB:null,sets:[],completed:false,roundNumber:round,courtNumber:i+1,sitOut})
  }
  return matches
}

function applyResult(players,match,scoreMode){
  const{teamA,teamB,scoreA,scoreB,sets,sitOut}=match
  let winner='draw',pA=0,pB=0
  if(scoreMode==='tennis'){
    const sA=sets.filter(s=>s.a>s.b).length,sB=sets.filter(s=>s.b>s.a).length
    winner=sA>sB?'A':sB>sA?'B':'draw'
    pA=sets.reduce((s,x)=>s+x.a,0);pB=sets.reduce((s,x)=>s+x.b,0)
  }else{pA=scoreA??0;pB=scoreB??0;winner=pA>pB?'A':pB>pA?'B':'draw'}
  return players.map(p=>{
    const inA=teamA.includes(p.id),inB=teamB.includes(p.id),rested=(sitOut||[]).includes(p.id)
    if(!inA&&!inB&&!rested)return p
    if(rested)return{...p,restCount:p.restCount+1}
    const myP=inA?pA:pB,oppP=inA?pB:pA
    const won=(inA&&winner==='A')||(inB&&winner==='B'),lost=(inA&&winner==='B')||(inB&&winner==='A')
    return{...p,wins:p.wins+(won?1:0),losses:p.losses+(lost?1:0),draws:p.draws+(winner==='draw'?1:0),points:p.points+myP,pointsAgainst:p.pointsAgainst+oppP,gamesPlayed:p.gamesPlayed+1}
  })
}

function ranked(players){return[...players].sort((a,b)=>b.wins-a.wins||b.points-a.points||a.pointsAgainst-b.pointsAgainst)}
function pn(players,id){return players.find(p=>p.id===id)?.name??'?'}
function modeMeta(mode){
  const map={
    americano:{label:'Americano',color:'blue'},
    mexicano:{label:'Mexicano',color:'yellow'},
    fixed_americano:{label:'Fix Team Americano',color:'blue'},
    fixed_mexicano:{label:'Fix Team Mexicano',color:'yellow'},
  }
  return map[mode]||{label:'Americano',color:'blue'}
}

// -- state & localstorage (Auto Save) -----------------------------------------
const defaultState = {
  phase:'setup',step:0,
  mode:null,scoreMode:null,courts:1,
  gameName:'',
  playerCount:8,playerNames:Array(24).fill(''),
  players:[],done:[],current:[],round:1,
  inputs:{},showHist:false,editing:false,activeTab:'match',
};

let S;
try {
  S = JSON.parse(localStorage.getItem('padelin_state')) || JSON.parse(JSON.stringify(defaultState));
} catch(e) {
  S = JSON.parse(JSON.stringify(defaultState));
}

if(!S.activeTab)S.activeTab='match'

const saveState = () => localStorage.setItem('padelin_state', JSON.stringify(S));

// -- Update Submit Button Realtime --------------------------------------------
function updateSubmitBtn() {
  const btn = document.getElementById('btn-submit');
  if (!btn) return;
  const max = S.scoreMode === 'total16' ? 16 : 21;
  const isReady = S.current.every(m => {
    const inp = S.inputs[m.id];
    if (!inp) return false;
    if (S.scoreMode === 'tennis') return inp.sets && inp.sets.length > 0;
    const sa = parseInt(inp.scoreA, 10), sb = parseInt(inp.scoreB, 10);
    return !isNaN(sa) && !isNaN(sb) && (sa + sb) === max;
  });
  
  if (isReady) {
    btn.removeAttribute('disabled');
  } else {
    btn.setAttribute('disabled', '');
  }
}

// -- render -------------------------------------------------------------------
const root=document.getElementById('root')
function render(){
  saveState(); // Simpan otomatis setiap ada perubahan render
  root.innerHTML=''
  root.appendChild(S.phase==='setup'?vSetup():S.phase==='playing'?vPlaying():vFinished())
}

// - SETUP ---------------------------------------------------------------------
function vSetup(){
  const wrap=el('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 16px 48px'}})

  wrap.appendChild(
    el('div',{style:{
      width:'100%',
      maxWidth:'480px',
      height:'128px',
      borderRadius:'16px',
      marginBottom:'16px',
      backgroundImage:"linear-gradient(rgba(15,23,42,.22),rgba(15,23,42,.22)), url('images/padel-header.jpg')",
      backgroundSize:'cover',
      backgroundPosition:'center center',
      backgroundRepeat:'no-repeat',
      boxShadow:'0 10px 24px rgba(37,99,235,.18)',
      display:'flex',
      alignItems:'center',
      justifyContent:'center',
      padding:'20px',
      overflow:'hidden'
    }},
      el('h1',{cls:'fd',style:{
        fontSize:'clamp(56px, 13vw, 82px)',
        lineHeight:'1',
        color:'#ffffff',
        textAlign:'center',
        textShadow:'0 4px 18px rgba(15,23,42,.45)'
      }},'PADELIN')
    )
  )

  // step indicator
  const sr=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'16px'}})
  ;['Mode','Players','Scoring'].forEach((lbl,i)=>{
    const cls=i<S.step?'sdot-done':i===S.step?'sdot-active':'sdot-pending'
    const dot=el('div',{cls:`sdot ${cls}`},i<S.step?svg('check',12):String(i+1))
    const label=el('span',{style:{fontSize:'11px',fontWeight:'600',color:i===S.step?'var(--primary)':'var(--muted)'}},lbl)
    sr.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},dot,label))
    if(i<2)sr.appendChild(el('div',{cls:`sline${i<S.step?' sline-done':''}`,style:{minWidth:'24px'}}))
  })
  wrap.appendChild(sr)

  const card=el('div',{cls:'card',style:{maxWidth:'480px',width:'100%'}})

  if(S.step===0){
    card.appendChild(el('div',{style:{marginBottom:'16px'}},
      el('h2',{cls:'fd',style:{fontSize:'32px'}},'Choose Game Mode')
    ))
    card.appendChild(el('div',{style:{marginBottom:'16px'}},
      el('p',{style:{fontSize:'11px',fontWeight:'700',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'8px'}},'Game Name'),
      el('input',{
        cls:'ti',
        type:'text',
        placeholder:'Enter padel game name',
        value:S.gameName??'',
        onInput:e=>{
          S.gameName=e.target.value
          saveState()
        }
      })
    ))
    const row=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}})
    ;[
      {id:'americano',label:'Americano',ic:'zap',desc:'Pair with everyone',c:'b',fixedId:'fixed_americano',fixedLabel:'Fixed Team Americano'},
      {id:'mexicano',label:'Mexicano',ic:'trophy',desc:'Winners pairing',c:'y',fixedId:'fixed_mexicano',fixedLabel:'Fixed Team Mexicano'},
    ].forEach(m=>{
      const active=S.mode===m.id
      const fixedActive=S.mode===m.fixedId
      const col=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',minWidth:'0'}})
      const mc=el('div',{cls:`mode-card ${active?'mc-'+m.c:''}`,onClick:()=>{S.mode=m.id;render()}})
      const ic=svg(m.ic,28);ic.style.color=m.c==='b'?'var(--primary)':'var(--secondary)'
      if(active){
        const chk=el('div',{style:{position:'absolute',top:'12px',right:'12px',background:m.c==='b'?'var(--primary)':'var(--secondary)',borderRadius:'50%',padding:'2px'}},svg('check',10))
        chk.querySelector('svg').style.color=m.c==='b'?'var(--dark-text)':'#fff';
        mc.appendChild(chk)
      }
      mc.append(ic,el('div',{},el('p',{cls:'fd',style:{fontSize:'24px'}},m.label),el('p',{style:{fontSize:'11px',color:'var(--muted)',marginTop:'4px',lineHeight:'1.4'}},m.desc)))
      const fixedBtn=el('div',{
        cls:`pill${fixedActive?` sel-${m.c}`:''}`,
        style:{padding:'8px 10px',fontSize:'11px',textAlign:'center'},
        onClick:()=>{S.mode=m.fixedId;render()}
      },m.fixedLabel)
      col.append(mc,fixedBtn)
      row.appendChild(col)
    })
    card.appendChild(row)
  }

  if(S.step===1){
    card.appendChild(el('div',{style:{marginBottom:'16px'}},
      el('h2',{cls:'fd',style:{fontSize:'32px'}},'Courts & Players')
    ))

    // courts
    card.appendChild(el('p',{style:{fontSize:'11px',fontWeight:'700',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'8px'}},'Number of Courts'))
    const cr=el('div',{style:{display:'flex',gap:'6px',marginBottom:'16px'}})
    ;[1,2,3].forEach(n=>{
      cr.appendChild(el('div',{cls:`pill${S.courts===n?' sel-b':''}`,onClick:()=>{
        S.courts=n
        if(S.playerCount<n*4){S.playerCount=n*4}
        render()
      }},`${n} Court${n>1?'s':''}`))
    })
    card.appendChild(cr)

    const needsEvenTeams=S.mode==='fixed_americano'||S.mode==='fixed_mexicano'
    const minP=S.courts*4
    card.appendChild(el('p',{style:{fontSize:'11px',fontWeight:'700',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'4px'}},'Number of Players'))

    // stepper
    const stepper=el('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px',flexWrap:'nowrap'}})
    const btnM=el('button',{cls:'btn btn-sec btn-sm',style:{width:'36px',height:'36px',padding:'0',flexShrink:'0'},onClick:()=>{
      if(S.playerCount>minP){
        S.playerCount--
        if(needsEvenTeams&&S.playerCount%2!==0&&S.playerCount>minP)S.playerCount--
        render()
      }
    }},'-')
    const cntEl=el('div',{cls:'fd',style:{fontSize:'40px',minWidth:'50px',textAlign:'center'}},String(S.playerCount))
    const btnP=el('button',{cls:'btn btn-sec btn-sm',style:{width:'36px',height:'36px',padding:'0',flexShrink:'0'},onClick:()=>{
      S.playerCount++
      if(needsEvenTeams&&S.playerCount%2!==0)S.playerCount++
      render()
    }},'+')
    const pr=el('div',{style:{display:'grid',gridTemplateRows:'repeat(2,auto)',gridAutoFlow:'column',gap:'4px',alignItems:'center',justifyContent:'start'}})
    ;[4,5,6,7,8,9,10,12].filter(n=>n>=minP&&(!needsEvenTeams||n%2===0)).forEach(n=>{
      pr.appendChild(el('div',{
        cls:`pill${S.playerCount===n?' sel-b':''}`,
        style:{padding:'4px 8px',fontSize:'11px',borderRadius:'8px'},
        onClick:()=>{S.playerCount=n;render()}
      },String(n)))
    })
    stepper.append(btnM,cntEl,btnP,pr)
    card.appendChild(stepper)

    card.appendChild(el('p',{style:{fontSize:'11px',fontWeight:'700',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'8px'}},'Player Names'))
    const namesWrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'240px',overflowY:'auto',paddingRight:'4px'}})
    for(let i=0;i<S.playerCount;i++){
      const row=el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}})
      const num=el('div',{cls:'fd',style:{width:'28px',height:'28px',borderRadius:'50%',background:'var(--surface-3)',color:'var(--text)',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}},String(i+1))
      const inp=el('input',{cls:'ti',style:{flex:'1'},type:'text',placeholder:`Player ${i+1}`,value:S.playerNames[i]??'',onInput:e=>{
        S.playerNames[i]=e.target.value; 
        saveState(); // Save live pas ngetik
      }})
      row.append(num,inp);namesWrap.appendChild(row)
    }
    card.appendChild(namesWrap)
  }

  if(S.step===2){
    card.appendChild(el('div',{style:{marginBottom:'16px'}},
      el('h2',{cls:'fd',style:{fontSize:'32px'}},'Scoring System')
    ))
    const opts=[
      {id:'total16',label:'Total 16',sub:'',sc:'b',rc:'rd-b'},
      {id:'total21',label:'Total 21',sub:'',sc:'y',rc:'rd-y'},
      {id:'tennis',label:'Tennis Sets',sub:'Enter each set score',sc:'o',rc:'rd-o'},
    ]
    const ow=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}})
    opts.forEach(o=>{
      const active=S.scoreMode===o.id
      const opt=el('div',{cls:`sc-opt${active?' sc-'+o.sc:''}`,onClick:()=>{S.scoreMode=o.id;render()}})
      const left=el('div',{},el('p',{cls:'fd',style:{fontSize:'24px'}},o.label),el('p',{style:{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}},o.sub))
      const dot=el('div',{cls:`rdot${active?' '+o.rc:''}`},active?el('div',{style:{width:'6px',height:'6px',background:o.sc==='b'?'var(--dark-text)':'#fff',borderRadius:'50%'}}):'')
      opt.append(left,dot);ow.appendChild(opt)
    })
    card.appendChild(ow)
  }

  const fixedMode=S.mode==='fixed_americano'||S.mode==='fixed_mexicano'
  const canNext=S.step===0?!!S.mode:S.step===1?(S.playerCount>=S.courts*4&&(!fixedMode||S.playerCount%2===0)):!!S.scoreMode
  const nav=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'24px'}})
  const back=el('button',{cls:'btn btn-ghost btn-md',disabled:S.step===0,onClick:()=>{S.step--;render()}},svg('cl',16),'Back')
  if(S.step<2){
    nav.append(back,el('button',{cls:'btn btn-primary btn-md',disabled:!canNext,onClick:()=>{S.step++;render()}},'Next',svg('cr',16)))
  }else{
    nav.append(back,el('button',{cls:'btn btn-primary btn-lg',disabled:!canNext,onClick:startGame},svg('zap',16),'Start Game!'))
  }
  card.appendChild(nav)
  wrap.appendChild(card)
  if(S.step===0){
    wrap.appendChild(el('p',{cls:'fd',style:{fontSize:'18px',color:'var(--primary)',marginTop:'16px',letterSpacing:'.08em',textAlign:'center'}},'PADEL SCORE TRACKER'))
  }
  return wrap
}

// - PLAYING -------------------------------------------------------------------
function vPlaying(){
  const wrap=el('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column'}})

  const modeCfg=modeMeta(S.mode)
  const modeL=modeCfg.label
  const scoreL=S.scoreMode==='total16'?'T16':S.scoreMode==='total21'?'T21':'Tennis'
  const hdr=el('div',{cls:'hdr'})
  const hl=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:'6px',minWidth:'0'}})
  hl.append(
    el('span',{cls:'fd',style:{fontSize:'20px',color:'var(--primary)'}},'PADELIN'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}},
      badge(modeL,modeCfg.color),
      badge(scoreL,S.scoreMode==='total16'?'blue':S.scoreMode==='total21'?'yellow':'orange'),
      badge(`Round ${S.round}`,'muted')
    )
  )
  
  const hr=el('div',{style:{display:'flex',gap:'8px',marginLeft:'auto',justifyContent:'flex-end',flexWrap:'wrap'}})
  hr.append(
    el('button',{cls:'btn btn-sec btn-sm',onClick:()=>{
      if(confirm('Yakin ingin kembali ke awal? Progress turnamen ini akan dibuang.')){
        localStorage.removeItem('padelin_state');
        S=JSON.parse(JSON.stringify(defaultState));
        render();
      }
    }},svg('cl',14), 'Home'),
    el('button',{cls:'btn btn-ghost btn-sm',onClick:()=>{S.editing=true;render()}},svg('edit',14),'Edit'),
    el('button',{cls:'btn btn-danger btn-sm',onClick:()=>{
      if(confirm('Akhiri turnamen sekarang dan lihat klasemen akhir?')){
        S.phase='finished';render();
      }
    }},svg('trophy',14),'End')
  )
  hdr.append(hl,hr);wrap.appendChild(hdr)

  if(S.editing)wrap.appendChild(vEditModal())

  const main=el('div',{style:{flex:'1',padding:'16px',maxWidth:'512px',margin:'0 auto',width:'100%',paddingBottom:'48px',display:'flex',flexDirection:'column',gap:'16px'}})

  if(S.current.length===0){
    const ec=el('div',{cls:'card',style:{textAlign:'center',marginTop:'32px',display:'flex',flexDirection:'column',gap:'16px',alignItems:'center'}})
    const ti=svg('trophy',40);ti.style.color='var(--primary)'
    ec.append(ti,el('h2',{cls:'fd',style:{fontSize:'28px'}},'All players played equally!'),el('p',{style:{fontSize:'13px',color:'var(--muted)'}},'Great session - check the final standings.'),el('button',{cls:'btn btn-primary btn-lg w-full',onClick:()=>{S.phase='finished';render()}},svg('trophy',16),'See Final Standings'))
    main.appendChild(ec)
    main.appendChild(vStandings())
    wrap.appendChild(main);return wrap
  }

  const sitOutIds=S.current[0]?.sitOut||[]
  const playingIds=S.current.flatMap(m=>[...m.teamA,...m.teamB])
  const tabs=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}})
  tabs.append(
    el('button',{
      cls:`btn ${S.activeTab==='match'?'btn-primary':'btn-sec'} btn-md`,
      onClick:()=>{S.activeTab='match';render()}
    },'Match'),
    el('button',{
      cls:`btn ${S.activeTab==='standings'?'btn-primary':'btn-sec'} btn-md`,
      onClick:()=>{S.activeTab='standings';render()}
    },'Standings')
  )
  main.appendChild(tabs)

  if(S.activeTab==='match'){
    S.current.forEach(m=>main.appendChild(vMatchCard(m)))

    if(sitOutIds.length>0){
      const names=sitOutIds.map(id=>pn(S.players,id)).join(', ')
      main.appendChild(el('p',{style:{textAlign:'center',fontSize:'12px',color:'var(--muted)'}},`Resting: ${names}`))
    }

    const max=S.scoreMode==='total16'?16:21
    const ready=S.current.every(m=>{
      const inp=S.inputs[m.id]
      if(!inp)return false
      if(S.scoreMode==='tennis')return inp.sets&&inp.sets.length>0
      const sa=parseInt(inp.scoreA,10), sb=parseInt(inp.scoreB,10)
      return!isNaN(sa)&&!isNaN(sb)&&(sa+sb)===max
    })
    
    main.appendChild(el('button',{id:'btn-submit', cls:'btn btn-primary btn-lg w-full',disabled:!ready,onClick:submitRound},svg('check',16),`Submit Round ${S.round}`))
  }else{
    main.appendChild(vStandings(playingIds))
    main.appendChild(vHistory())
  }

  wrap.appendChild(main);return wrap
}

function vMatchCard(match){
  const card=el('div',{cls:'card glow',style:{display:'flex',flexDirection:'column',gap:'16px'}})
  card.append(
    el('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px'}},
      el('div',{},
        el('p',{style:{fontSize:'11px',fontWeight:'700',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px'}},`Court ${match.courtNumber}`),
        el('h2',{cls:'fd',style:{fontSize:'28px',color:'var(--primary)'}},'ON COURT')
      ),
      el('button',{
        cls:'btn btn-sec btn-sm',
        onClick:()=>{
          if(confirm('Acak ulang pemain dan rotasi istirahat di ronde ini?')) {
            S.inputs = {};
            S.current = genMatches(S.players, S.done, S.mode, S.round, S.courts);
            render();
          }
        }
      },svg('restart',14),'Re Roll')
    )
  )
  const teams=el('div',{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'12px',alignItems:'center'}})
  const ca=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}})
  const cb=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}})
  match.teamA.forEach(id=>ca.appendChild(el('div',{cls:'team-chip'},pn(S.players,id))))
  match.teamB.forEach(id=>cb.appendChild(el('div',{cls:'team-chip b'},pn(S.players,id))))
  teams.append(ca,el('div',{cls:'fd',style:{fontSize:'20px',color:'var(--muted)',textAlign:'center'}},'VS'),cb)
  card.appendChild(teams)
  const sw=el('div',{style:{borderTop:'1px solid var(--border)',paddingTop:'16px'}})
  sw.appendChild(vScoreInput(match));card.appendChild(sw)
  return card
}

function vScoreInput(match){
  const inp=S.inputs[match.id]||{scoreA:'',sets:[]}
  if(S.scoreMode==='tennis'){
    const wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}})
    if(inp.sets&&inp.sets.length>0){
      const sw=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}})
      inp.sets.forEach((s,i)=>{
        const row=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--surface-3)',borderRadius:'12px',padding:'10px 14px'}})
        const sc=el('span',{cls:'fd',style:{fontSize:'24px'}})
        sc.appendChild(el('span',{style:{color:s.a>s.b?'var(--primary)':'var(--muted)'}},String(s.a)))
        sc.appendChild(document.createTextNode(' - '))
        sc.appendChild(el('span',{style:{color:s.b>s.a?'var(--primary)':'var(--muted)'}},String(s.b)))
        const del=el('button',{cls:'btn btn-ghost btn-sm',style:{padding:'4px'},onClick:()=>{
          if(!S.inputs[match.id])S.inputs[match.id]={scoreA:'',sets:[]}
          S.inputs[match.id].sets=inp.sets.filter((_,j)=>j!==i);render()
        }},svg('x',14))
        row.append(sc,el('span',{style:{fontSize:'11px',color:'var(--text)'}},`Set ${i+1}`),del)
        sw.appendChild(row)
      })
      const sA=inp.sets.filter(s=>s.a>s.b).length,sB=inp.sets.filter(s=>s.b>s.a).length
      const sr=el('p',{style:{textAlign:'center',fontSize:'12px',color:'var(--muted)'}})
      sr.append(el('span',{style:{color:'var(--primary)',fontWeight:'700'}},String(sA)),' - ',el('span',{style:{color:'var(--secondary)',fontWeight:'700'}},String(sB)),' sets')
      sw.appendChild(sr);wrap.appendChild(sw)
    }
    let tA='',tB=''
    const iA=el('input',{type:'number',cls:'ti',style:{width:'64px',textAlign:'center',fontSize:'22px',fontFamily:"'Bebas Neue',sans-serif",padding:'8px'},placeholder:'A',min:'0',max:'7',onInput:e=>tA=e.target.value})
    const iB=el('input',{type:'number',cls:'ti',style:{width:'64px',textAlign:'center',fontSize:'22px',fontFamily:"'Bebas Neue',sans-serif",padding:'8px'},placeholder:'B',min:'0',max:'7',onInput:e=>tB=e.target.value})
    const addBtn=el('button',{cls:'btn btn-sec btn-sm',onClick:()=>{
      const a=parseInt(iA.value,10),b=parseInt(iB.value,10)
      if(!isNaN(a)&&!isNaN(b)&&a>=0&&b>=0){
        if(!S.inputs[match.id])S.inputs[match.id]={scoreA:'',sets:[]}
        S.inputs[match.id].sets=[...(S.inputs[match.id].sets||[]),{a,b}];render()
      }
    }},svg('plus',14),'Add Set')
    wrap.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'8px',justifyContent:'center'}},iA,el('span',{style:{color:'var(--muted)'}},'-'),iB,addBtn))
    return wrap
  }
  
  const max=S.scoreMode==='total16'?16:21
  const initA=inp.scoreA??'', initB=inp.scoreB??''
  const idA=`scoreA_${match.id}`
  const idB=`scoreB_${match.id}`

  const wrap=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'12px'}})
  const row=el('div',{style:{display:'flex',alignItems:'center',gap:'16px'}})

  const inpA=el('input',{type:'number', id:idA, cls:'score-in',placeholder:'0',min:'0',max:String(max),value:initA,
    onInput:e=>{
      let v=parseInt(e.target.value,10)
      if(!S.inputs[match.id])S.inputs[match.id]={scoreA:'',scoreB:'',sets:[]}
      if(isNaN(v)){
        e.target.value=''
        S.inputs[match.id].scoreA=''
        S.inputs[match.id].scoreB=''
        document.getElementById(idB).value=''
      }else{
        v=Math.max(0,Math.min(max,v))
        e.target.value=String(v)
        S.inputs[match.id].scoreA=String(v)
        
        // Auto-fill B
        const bVal = max - v
        S.inputs[match.id].scoreB=String(bVal)
        document.getElementById(idB).value=String(bVal)
      }
      updateSubmitBtn();
      saveState(); // Save live
    }
  })
  
  const inpB=el('input',{type:'number', id:idB, cls:'score-in team-b',placeholder:'0',min:'0',max:String(max),value:initB,
    onInput:e=>{
      let v=parseInt(e.target.value,10)
      if(!S.inputs[match.id])S.inputs[match.id]={scoreA:'',scoreB:'',sets:[]}
      if(isNaN(v)){
        e.target.value=''
        S.inputs[match.id].scoreA=''
        S.inputs[match.id].scoreB=''
        document.getElementById(idA).value=''
      }else{
        v=Math.max(0,Math.min(max,v))
        e.target.value=String(v)
        S.inputs[match.id].scoreB=String(v)
        
        // Auto-fill A
        const aVal = max - v
        S.inputs[match.id].scoreA=String(aVal)
        document.getElementById(idA).value=String(aVal)
      }
      updateSubmitBtn();
      saveState(); // Save live
    }
  })

  const colA=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}},
    el('span',{style:{fontSize:'11px',fontWeight:'600',color:'var(--primary)',textTransform:'uppercase',letterSpacing:'.5px'}},'Team A'),
    inpA
  )
  const colB=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}},
    el('span',{style:{fontSize:'11px',fontWeight:'600',color:'var(--secondary)',textTransform:'uppercase',letterSpacing:'.5px'}},'Team B'),
    inpB
  )
  row.append(colA,el('div',{cls:'fd',style:{fontSize:'22px',color:'var(--muted)',paddingTop:'24px'}},'vs'),colB)
  wrap.append(row,el('p',{style:{fontSize:'11px',color:'var(--muted)'}},`Max total: ${max} pts`))
  return wrap
}

function vStandings(hlIds=[]){
  const card=el('div',{cls:'card'})
  const tr=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}})
  const si=svg('shield',16);si.style.color='var(--primary)'
  tr.append(si,el('h3',{cls:'fd',style:{fontSize:'22px'}},'Standings'),badge(`${S.done.length} played`,'muted'))
  card.appendChild(tr)
  const r=ranked(S.players)
  const tbl=el('table',{cls:'st'})
  tbl.appendChild(el('thead',{},el('tr',{},
    el('th',{},'#'),el('th',{},'Player'),
    el('th',{style:{textAlign:'center'}},'GP'),el('th',{style:{textAlign:'center'}},'W'),
    el('th',{style:{textAlign:'center'}},'D'),el('th',{style:{textAlign:'center'}},'L'),
    el('th',{style:{textAlign:'center'}},'Pts'),el('th',{style:{textAlign:'center'}},'Diff')
  )))
  const tb=el('tbody')
  r.forEach((p,i)=>{
    const hl=hlIds.includes(p.id),diff=p.points-p.pointsAgainst
    const row=el('tr',{style:{background:hl?'var(--primary-bg)':''}})
    const rankEl=i===0?(()=>{const c=svg('crown',14);c.style.color='var(--primary)';return c})():el('span',{style:{color:'var(--muted)'}},(i+1).toString())
    row.append(
      el('td',{},rankEl),
      el('td',{style:{fontWeight:'600',color:hl?'var(--primary)':'',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
      el('td',{style:{textAlign:'center',color:'var(--muted)'}},String(p.gamesPlayed)),
      el('td',{style:{textAlign:'center',fontWeight:'700',color:'var(--primary)'}},String(p.wins)),
      el('td',{style:{textAlign:'center',color:'var(--muted)'}},String(p.draws)),
      el('td',{style:{textAlign:'center',color:'var(--red)'}},String(p.losses)),
      el('td',{style:{textAlign:'center',fontWeight:'700'}},String(p.points)),
      el('td',{style:{textAlign:'center',fontWeight:'600',color:diff>0?'var(--primary)':diff<0?'var(--red)':'var(--muted)'}},`${diff>0?'+':''}${diff}`)
    )
    tb.appendChild(row)
  })
  tbl.appendChild(tb);card.appendChild(tbl);return card
}

function vHistory(){
  const card=el('div',{cls:'card'})
  const tr=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'},onClick:()=>{S.showHist=!S.showHist;render()}})
  const hl=el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}})
  const hi=svg('hist',16);hi.style.color='var(--muted)'
  hl.append(hi,el('h3',{cls:'fd',style:{fontSize:'22px'}},'Match History'),badge(String(S.done.length),'muted'))
  const chev=svg('cd',16);chev.style.color='var(--muted)';if(!S.showHist)chev.style.transform='rotate(-90deg)'
  tr.append(hl,chev);card.appendChild(tr)
  if(S.showHist){
    const lw=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginTop:'12px'}})
    if(!S.done.length)lw.appendChild(el('p',{style:{fontSize:'13px',color:'var(--muted)',textAlign:'center',padding:'12px 0'}},'No matches yet.'))
    else[...S.done].reverse().forEach(m=>lw.appendChild(vHistItem(m)))
    card.appendChild(lw)
  }
  return card
}

function vHistItem(m){
  const nA=m.teamA.map(id=>pn(S.players,id)).join(' / ')
  const nB=m.teamB.map(id=>pn(S.players,id)).join(' / ')
  let sc='',winA=false
  if(S.scoreMode==='tennis'){sc=m.sets.map(s=>`${s.a}-${s.b}`).join(', ');winA=m.sets.filter(s=>s.a>s.b).length>m.sets.filter(s=>s.b>s.a).length}
  else{sc=`${m.scoreA??'-'} : ${m.scoreB??'-'}`;winA=(m.scoreA??0)>(m.scoreB??0)}
  const item=el('div',{cls:'hi'})
  item.append(
    el('span',{cls:'fd',style:{minWidth:'40px',textAlign:'center',fontSize:'14px',color:'var(--muted)'}},`R${m.roundNumber}C${m.courtNumber}`),
    el('div',{style:{flex:'1',minWidth:'0'}},el('span',{style:{display:'block',fontWeight:'600',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:winA?'var(--primary)':'var(--muted)'}},nA)),
    el('span',{cls:'fd',style:{fontSize:'18px',padding:'0 6px'}},sc),
    el('div',{style:{flex:'1',minWidth:'0',textAlign:'right'}},el('span',{style:{display:'block',fontWeight:'600',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:!winA?'var(--secondary)':'var(--muted)'}},nB))
  )
  return item
}

function vEditModal(){
  const bg=el('div',{cls:'modal-bg',onClick:e=>{if(e.target===bg){S.editing=false;render()}}})
  const card=el('div',{cls:'card',style:{maxWidth:'400px',width:'100%'}})
  const tr=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}})
  const xb=el('button',{cls:'btn btn-ghost btn-sm',style:{padding:'4px'},onClick:()=>{S.editing=false;render()}},svg('x',18))
  tr.append(el('h3',{cls:'fd',style:{fontSize:'22px'}},'Edit Player Names'),xb)
  card.appendChild(tr)
  const edits=S.players.map(p=>({id:p.id,name:p.name}))
  const lw=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'60vh',overflowY:'auto',paddingRight:'4px'}})
  edits.forEach((p,i)=>{
    lw.appendChild(el('input',{cls:'ti w-full',type:'text',value:p.name,placeholder:`Player ${i+1}`,onInput:e=>{edits[i].name=e.target.value}}))
  })
  card.appendChild(lw)
  card.appendChild(el('button',{cls:'btn btn-primary w-full btn-md',style:{marginTop:'16px'},onClick:()=>{
    S.players=S.players.map(p=>{const u=edits.find(x=>x.id===p.id);return u?{...p,name:u.name.trim()||p.name}:p})
    S.editing=false;render()
  }},svg('check',14),'Save Names'))
  bg.appendChild(card);return bg
}

// - FINISHED ------------------------------------------------------------------
function vFinished(){
  const r=ranked(S.players),w=r[0]
  const modeCfg=modeMeta(S.mode)
  let showAll=false
  const wrap=el('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column'}})

  // hero
  const hero=el('div',{style:{textAlign:'center',padding:'48px 16px 32px',background:'linear-gradient(to bottom,var(--primary-bg),transparent)'}})
  const ring=el('div',{cls:'winner-ring'});const ci=svg('crown',36);ci.style.color='var(--primary)';ring.appendChild(ci)
  hero.append(ring,badge('Tournament Complete','yellow'),el('h1',{cls:'fd',style:{fontSize:'clamp(40px,10vw,72px)',lineHeight:'1',marginTop:'12px'}},w?.name||''),
    (()=>{const row=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginTop:'12px',flexWrap:'wrap'}});row.append(badge(modeCfg.label,modeCfg.color),badge(S.scoreMode==='tennis'?'Tennis':S.scoreMode==='total16'?'Total 16':'Total 21','muted'),badge(`${S.players.length} players`,'muted'));return row})()
  )
  wrap.appendChild(hero)

  const main=el('div',{style:{padding:'16px',maxWidth:'512px',margin:'0 auto',width:'100%',paddingBottom:'48px',display:'flex',flexDirection:'column',gap:'16px'}})

  main.appendChild(vStandings())

  // all matches
  const hc=el('div',{cls:'card'})
  const htr=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'},onClick:()=>{
    showAll=!showAll
    const hl=document.getElementById('hall');const hch=document.getElementById('hchev')
    if(hl)hl.style.display=showAll?'flex':'none'
    if(hch)hch.style.transform=showAll?'':'rotate(-90deg)'
  }})
  const hll=el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}})
  const hii=svg('hist',16);hii.style.color='var(--muted)'
  hll.append(hii,el('h3',{cls:'fd',style:{fontSize:'22px'}},'All Matches'),badge(String(S.done.length),'muted'))
  const hch=svg('cd',16);hch.id='hchev';hch.style.color='var(--muted)';hch.style.transform='rotate(-90deg)'
  htr.append(hll,hch);hc.appendChild(htr)
  const hall=el('div',{id:'hall',style:{display:'none',flexDirection:'column',gap:'8px',marginTop:'12px'}})
  ;[...S.done].reverse().forEach(m=>hall.appendChild(vHistItem(m)))
  hc.appendChild(hall);main.appendChild(hc)

  main.appendChild(el('button',{cls:'btn btn-sec btn-lg w-full',onClick:()=>{
    localStorage.removeItem('padelin_state'); // Buang savean lama
    S=JSON.parse(JSON.stringify(defaultState));
    render()
  }},svg('restart',16),'New Tournament'))

  wrap.appendChild(main);return wrap
}

// -- actions -------------------------------------------------------------------
function startGame(){
  const names=S.playerNames.slice(0,S.playerCount)
  S.players=shuf(names.map((n,i)=>mkPlayer(n||`Player ${i+1}`)))
  S.done=[];S.round=1;S.inputs={}
  S.activeTab='match'
  S.current=genMatches(S.players,[],S.mode,1,S.courts)
  S.phase='playing';render()
}

function submitRound(){
  if(!S.current.length||!S.scoreMode||!S.mode)return
  const completions=[]
  for(const m of S.current){
    const inp=S.inputs[m.id]||{scoreA:'',scoreB:'',sets:[]}
    let completed
    if(S.scoreMode==='tennis')completed={...m,sets:inp.sets||[],completed:true}
    else{
      const sA=parseInt(inp.scoreA,10)||0
      const sB=parseInt(inp.scoreB,10)||0
      completed={...m,scoreA:sA,scoreB:sB,completed:true}
    }
    completions.push(completed)
  }
  let up=[...S.players]
  for(const c of completions)up=applyResult(up,c,S.scoreMode)
  const newDone=[...S.done,...completions]
  S.players=up;S.done=newDone;S.round++;S.inputs={}
  S.current=genMatches(up,newDone,S.mode,S.round,S.courts)
  render()
}

render()
</script>
